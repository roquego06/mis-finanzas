  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ntent:space-between;font-size:11.5px;color:var(--ink-soft)}\n.debtrow{cursor:pointer}\n.milerow{display:flex;align-items:center;gap:10px;margin-bottom:16px}\n.milerow:last-child{margin-bottom:0}\n.milelabel{width:118px;font-size:12px;color:var(--ink-soft);flex-shrink:0}\n.miletrack{position:relative;flex:1;height:8px;background:var(--line);border-radius:4px}\n.milefill{position:absolute;left:0;top:0;bottom:0;border-radius:4px}\n.miledot{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);transform:translate(-50%,-50%);cursor:pointer}\n.miletip{position:absolute;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:11.5px;white-space:nowrap;z-index:5;box-shadow:0 6px 18px rgba(0,0,0,.4)}\n.planstatline{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}\n.planstat{flex:1;min-width:110px}\n.planstatlabel{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}\n.planstatval{font-size:17px;font-weight:700}\n.deudasub{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:0 0 18px;overflow-x:auto}\n.deudasubbtn{font-size:12.5px;font-weight:600;padding:8px 14px;background:transparent;border:none;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}\n.deudasubbtn.active{color:var(--ink);border-bottom-color:var(--accent)}\n.markpaidbtn{width:100%;background:transparent;border:1px solid var(--good);color:var(--good);border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}\n.markpaidbtn:disabled{opacity:.5;border-color:var(--line);color:var(--ink-soft);cursor:default}\n<\u002Fstyle><\u002Fhelmet>\n<div class=\"app\">\n<div class=\"wrap\">\n<div class=\"topbar\">\n<div><h1 class=\"title serif\">Mis Finanzas<\u002Fh1><div class=\"status\"><span class=\"dot {{ connDotClass }}\"><\u002Fspan>{{ connLabel }}<\u002Fdiv><\u002Fdiv>\n<button class=\"iconbtn\" sc-camel-on-click=\"{{ reload }}\" title=\"Actualizar\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" class=\"{{ spinClass }}\"><polyline points=\"23 4 23 10 17 10\"><\u002Fpolyline><polyline points=\"1 20 1 14 7 14\"><\u002Fpolyline><path d=\"M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n<\u002Fdiv>\n<div class=\"nav\">\n<sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\"><button class=\"navbtn {{ t.activeClass }}\" sc-camel-on-click=\"{{ t.onClick }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for>\n<\u002Fdiv>\n\n<sc-if value=\"{{ isResumen }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"months\"><sc-for list=\"{{ months }}\" as=\"m\" hint-placeholder-count=\"6\"><button class=\"mchip {{ m.activeClass }}\" sc-camel-on-click=\"{{ m.onClick }}\">{{ m.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n<div class=\"summary\">\n<div class=\"card\"><div class=\"cardlabel\">Total {{ monthLabel }}<\u002Fdiv><div class=\"cardvalue\">{{ totalMes }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"cardlabel\">Pagado<\u002Fdiv><div class=\"cardvalue\" style=\"color:var(--good)\">{{ totalPagado }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"cardlabel\">Pendiente<\u002Fdiv><div class=\"cardvalue\" style=\"color:var(--warn)\">{{ totalPendiente }}<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"cardlabel\">vs. mes anterior<\u002Fdiv><div class=\"cardvalue\" style=\"color:{{ varColor }}\">{{ varText }}<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<sc-if value=\"{{ hasAlert }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"alert\">⚠ {{ alertText }}<\u002Fdiv><\u002Fsc-if>\n\n<sc-if value=\"{{ hasPending }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"section\">Pendientes de {{ monthLabel }}<\u002Fdiv>\n<div class=\"panel\"><sc-for list=\"{{ pendientes }}\" as=\"p\" hint-placeholder-count=\"2\">\n<div class=\"pendrow\" style=\"flex-wrap:wrap\"><div style=\"min-width:0\"><div class=\"fs14 fw5\" style=\"white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.concepto }}<\u002Fdiv><div class=\"mono fs11\" style=\"color:var(--ink-soft)\">{{ p.categoria }}<\u002Fdiv><\u002Fdiv><div style=\"display:flex;align-items:center;gap:12px\">\n<sc-if value=\"{{ p.isEditing }}\" hint-placeholder-val=\"{{ false }}\"><input class=\"goalinput mono\" style=\"width:110px\" type=\"number\" sc-camel-default-value=\"{{ p.montoInput }}\" sc-camel-on-blur=\"{{ p.onMontoChange }}\"><\u002Fsc-if>\n<sc-if value=\"{{ p.isNotEditing }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ p.onStartEdit }}\"><span class=\"mono fw6\">{{ p.montoFmt }}<\u002Fspan><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<button class=\"markbtn\" sc-camel-on-click=\"{{ p.onMark }}\">Marcar pagado<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fsc-for><\u002Fdiv>\n<\u002Fsc-if>\n\n<div class=\"section\">Presupuesto y gasto por categoría<\u002Fdiv>\n<div class=\"panelsub\">La línea vertical marca dónde caería tu objetivo (% del ingreso) sobre el presupuesto de esa categoría.<\u002Fdiv>\n<div class=\"panel panelpad\"><sc-if value=\"{{ hasBudgetRows }}\" hint-placeholder-val=\"{{ true }}\">\n<sc-for list=\"{{ catRows }}\" as=\"c\" hint-placeholder-count=\"4\">\n<div class=\"unirow\"><div class=\"unitop\"><span class=\"uniname\">{{ c.categoria }}<\u002Fspan><span class=\"uniamt mono\" style=\"color:{{ c.color }}\">{{ c.montoFmt }}<\u002Fspan><\u002Fdiv>\n<div class=\"unibar\"><div class=\"unifill\" style=\"width:{{ c.pct }};background:{{ c.color }}\"><\u002Fdiv><div class=\"unitick\" style=\"left:{{ c.tickPos }}\"><\u002Fdiv><\u002Fdiv>\n<div class=\"unimeta\">{{ c.metaTxt }}<\u002Fdiv>\n<div class=\"uniedit\">\n<sc-if value=\"{{ c.isEditingMonto }}\" hint-placeholder-val=\"{{ false }}\"><label>Presupuesto <input class=\"mono\" type=\"number\" sc-camel-default-value=\"{{ c.montoInput }}\" sc-camel-on-blur=\"{{ c.onMontoChange }}\" placeholder=\"0\"><\u002Flabel><\u002Fsc-if>\n<sc-if value=\"{{ c.isNotEditingMonto }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ c.onStartEditMonto }}\"><span class=\"fs11\" style=\"color:var(--ink-soft)\">Presupuesto<\u002Fspan><span class=\"mono\">{{ c.montoFmtShort }}<\u002Fspan><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<sc-if value=\"{{ c.isEditingObjetivo }}\" hint-placeholder-val=\"{{ false }}\"><label>Objetivo % ing. <input class=\"mono\" type=\"number\" sc-camel-default-value=\"{{ c.objetivoInput }}\" sc-camel-on-blur=\"{{ c.onObjetivoChange }}\" placeholder=\"0\"><\u002Flabel><\u002Fsc-if>\n<sc-if value=\"{{ c.isNotEditingObjetivo }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ c.onStartEditObjetivo }}\"><span class=\"fs11\" style=\"color:var(--ink-soft)\">Objetivo % ing.<\u002Fspan><span class=\"mono\">{{ c.objetivoInput }}%<\u002Fspan><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-for>\n<\u002Fsc-if><sc-if value=\"{{ noBudgetRows }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"emptyrow\">No hay presupuestos ni gastos cargados para este mes.<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isPresupuestos }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"months\">{{ monthsBlockPlaceholder }}<sc-for list=\"{{ months }}\" as=\"m2\" hint-placeholder-count=\"6\"><button class=\"mchip {{ m2.activeClass }}\" sc-camel-on-click=\"{{ m2.onClick }}\">{{ m2.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n<div class=\"section\">Presupuesto mensual total<\u002Fdiv>\n<div class=\"panel panelpad\" style=\"padding:16px 18px\"><div class=\"goalcard\">\n<div><div class=\"cardlabel\">Gastado {{ monthLabel }}<\u002Fdiv><div class=\"cardvalue\">{{ totalMes }}<\u002Fdiv><\u002Fdiv>\n<div><div class=\"cardlabel\">Presupuesto total cargado<\u002Fdiv><div class=\"cardvalue mono\">{{ totalPresupuestoMes }}<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"section\">Detalle por categoría<\u002Fdiv>\n<div class=\"panel panelpad\"><sc-if value=\"{{ hasBudgetRows }}\" hint-placeholder-val=\"{{ true }}\"><sc-for list=\"{{ catRows }}\" as=\"c2\" hint-placeholder-count=\"4\">\n<div class=\"unirow\"><div class=\"unitop\"><span class=\"uniname\">{{ c2.categoria }}<\u002Fspan><span class=\"uniamt mono\" style=\"color:{{ c2.color }}\">{{ c2.montoFmt }}<\u002Fspan><\u002Fdiv>\n<div class=\"unibar\"><div class=\"unifill\" style=\"width:{{ c2.pct }};background:{{ c2.color }}\"><\u002Fdiv><div class=\"unitick\" style=\"left:{{ c2.tickPos }}\"><\u002Fdiv><\u002Fdiv>\n<div class=\"unimeta\">{{ c2.metaTxt }}<\u002Fdiv>\n<div class=\"uniedit\">\n<sc-if value=\"{{ c2.isEditingMonto }}\" hint-placeholder-val=\"{{ false }}\"><label>Presupuesto <input class=\"mono\" type=\"number\" sc-camel-default-value=\"{{ c2.montoInput }}\" sc-camel-on-blur=\"{{ c2.onMontoChange }}\" placeholder=\"0\"><\u002Flabel><\u002Fsc-if>\n<sc-if value=\"{{ c2.isNotEditingMonto }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ c2.onStartEditMonto }}\"><span class=\"fs11\" style=\"color:var(--ink-soft)\">Presupuesto<\u002Fspan><span class=\"mono\">{{ c2.montoFmtShort }}<\u002Fspan><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<sc-if value=\"{{ c2.isEditingObjetivo }}\" hint-placeholder-val=\"{{ false }}\"><label>Objetivo % ing. <input class=\"mono\" type=\"number\" sc-camel-default-value=\"{{ c2.objetivoInput }}\" sc-camel-on-blur=\"{{ c2.onObjetivoChange }}\" placeholder=\"0\"><\u002Flabel><\u002Fsc-if>\n<sc-if value=\"{{ c2.isNotEditingObjetivo }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ c2.onStartEditObjetivo }}\"><span class=\"fs11\" style=\"color:var(--ink-soft)\">Objetivo % ing.<\u002Fspan><span class=\"mono\">{{ c2.objetivoInput }}%<\u002Fspan><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-for><\u002Fsc-if><sc-if value=\"{{ noBudgetRows }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"emptyrow\">Cargá una fila en la pestaña \"Presupuestos\" de tu Sheet para este mes.<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isDeudas }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"section\">Deudas y préstamos<\u002Fdiv>\n<sc-if value=\"{{ hasDeudas }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"panel hero\"><div class=\"ring\" style=\"background:conic-gradient(var(--good) 0% {{ pctPagadoOverall }}%,var(--line) {{ pctPagadoOverall }}% 100%)\"><\u002Fdiv>\n<div style=\"flex:1;min-width:0\" \u002Fsc-if>\n<\u002Fdiv>\n<div class=\"planstatline\" style=\"border-top:none;padding-top:0;margin-top:0\">\n<div class=\"planstat\"><div class=\"planstatlabel\">Plazo<\u002Fdiv><div class=\"planstatval\">{{ naranjaSimPlazoTxt }}<\u002Fdiv><\u002Fdiv>\n<div class=\"planstat\"><div class=\"planstatlabel\">Interés total<\u002Fdiv><div class=\"planstatval mono\">{{ naranjaSimInteresFmt }}<\u002Fdiv><\u002Fdiv>\n<div class=\"planstat\"><div class=\"planstatlabel\">Ahorro vs. mínimo<\u002Fdiv><div class=\"planstatval\" style=\"color:var(--good)\">{{ naranjaSimAhorroFmt }}<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isDeudasOtras }}\" hint-placeholder-val=\"{{ false }}\">\n<sc-if value=\"{{ hasOtrasDeudas }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"section\">Otras deudas y préstamos<\u002Fdiv>\n<div class=\"panel panelpad\"><sc-for list=\"{{ otrasDeudaRows }}\" as=\"od\" hint-placeholder-count=\"2\">\n<div class=\"unirow debtrow\" sc-camel-on-click=\"{{ od.onToggle }}\"><div class=\"unitop\"><span class=\"uniname serif\">{{ od.nombre }}<\u002Fspan><span class=\"uniamt mono\">{{ od.saldoFmt }}<\u002Fspan><\u002Fdiv>\n<div class=\"unibar\"><div class=\"unifill\" style=\"width:{{ od.pct }};background:var(--good)\"><\u002Fdiv><\u002Fdiv>\n<div class=\"unimeta\" style=\"display:flex;justify-content:space-between;align-items:center;gap:8px\"><span>{{ od.metaShort }}<\u002Fspan><span class=\"statusbadge {{ od.badgeClass }}\">{{ od.estadoLabel }}<\u002Fspan><\u002Fdiv>\n<sc-if value=\"{{ od.expanded }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"expandwrap\">\n<div class=\"expandrow\"><span>Cuota mensual<\u002Fspan><span class=\"mono\">{{ od.cuotaFmt }}<\u002Fspan><\u002Fdiv>\n<div class=\"expandrow\"><span>Cuotas restantes<\u002Fspan><span class=\"mono\">{{ od.cuotasRestantesTxt }}<\u002Fspan><\u002Fdiv>\n<div class=\"expandrow\"><span>TNA<\u002Fspan><span class=\"mono\">{{ od.tnaTxt }}<\u002Fspan><\u002Fdiv>\n<div class=\"expandrow\"><span>Libre de esta deuda<\u002Fspan><span class=\"mono\">{{ od.payoffLabel }}<\u002Fspan><\u002Fdiv>\n<\u002Fdiv><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-for><\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ noOtrasDeudas }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"panel\"><div class=\"emptyrow\">No hay más deudas cargadas — solo Galicia y Naranja.<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n<\u002Fsc-if>\n<sc-if value=\"{{ noDeudas }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"panel\"><div class=\"emptyrow\">No hay datos en la pestaña \"Deudas tarjeta\" todavía.<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isMeta }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"section\">Meta de ahorro — {{ monthLabel }}<\u002Fdiv>\n<div class=\"panel panelpad\" style=\"padding:16px 18px\">\n<div class=\"goalcard\"><div><div class=\"cardlabel\">Ahorro este mes<\u002Fdiv><div class=\"cardvalue\" style=\"color:{{ savingsColor }}\">{{ savingsAmount }}<\u002Fdiv><\u002Fdiv>\n<div class=\"goalrow\" style=\"display:flex;align-items:center;gap:12px\">\n<sc-if value=\"{{ isEditingGoal }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"mono fs12\" style=\"color:var(--ink-soft)\">Meta mensual<\u002Fspan><input class=\"goalinput mono\" type=\"number\" sc-camel-default-value=\"{{ goalInput }}\" sc-camel-on-blur=\"{{ onGoalBlur }}\" placeholder=\"0\"><\u002Fsc-if>\n<sc-if value=\"{{ isNotEditingGoal }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"editpill\" sc-camel-on-click=\"{{ onStartEditGoal }}\"><span class=\"fs11\" style=\"color:var(--ink-soft)\">Meta mensual<\u002Fspan><span class=\"mono\">{{ goalFmt }}<\u002Fspan><svg width=\"12\" height=\"12\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"bartrack\" style=\"margin-top:14px\"><div class=\"barfill\" style=\"width:{{ goalPct }};background:{{ savingsColor }}\"><\u002Fdiv><\u002Fdiv>\n<div class=\"mono fs11\" style=\"color:var(--ink-soft);margin-top:6px\">{{ goalStatusTxt }}<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"section\">Historial<\u002Fdiv>\n<sc-if value=\"{{ hasStreak }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"panelsub\" style=\"margin:-2px 0 10px\">Racha actual: <span style=\"color:var(--good)\" class=\"fw6\">{{ streakTxt }}<\u002Fspan> cumpliendo la meta<\u002Fdiv><\u002Fsc-if>\n<div class=\"panel\"><sc-for list=\"{{ savingsHistory }}\" as=\"h\" hint-placeholder-count=\"6\">\n<div class=\"pendrow\"><span class=\"fs14 fw5\">{{ h.label }}<\u002Fspan><div style=\"display:flex;align-items:center;gap:12px\"><span class=\"mono\">{{ h.ahorroFmt }}<\u002Fspan><span class=\"mono fs11\" style=\"color:{{ h.color }}\">{{ h.estado }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fsc-for><\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fsc-if><\u002Fdiv>\n<\u002Fdiv>\n\n<sc-if value=\"{{ isResumen }}\" hint-placeholder-val=\"{{ true }}\"><button class=\"fab\" sc-camel-on-click=\"{{ openModal }}\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>Agregar gasto<\u002Fbutton><\u002Fsc-if>\n\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"modalbg\" sc-camel-on-click=\"{{ onBackdropClick }}\"><div class=\"modal\">\n<div class=\"modalhead\"><h2 class=\"serif\" style=\"font-size:18px;margin:0\">Nuevo movimiento<\u002Fh2><button class=\"closebtn\" sc-camel-on-click=\"{{ closeModal }}\">✕<\u002Fbutton><\u002Fdiv>\n<div class=\"field\"><label>Concepto<\u002Flabel><input value=\"{{ form.concepto }}\" sc-camel-on-input=\"{{ onConceptoInput }}\" placeholder=\"Ej: Supermercado\"><\u002Fdiv>\n<div class=\"row2\">\n<div class=\"field\"><label>Categoría<\u002Flabel><input value=\"{{ form.categoria }}\" sc-camel-on-input=\"{{ onCategoriaInput }}\" list=\"catlist\" placeholder=\"Elegí o escribí\"><datalist id=\"catlist\"><sc-for list=\"{{ categoriesList }}\" as=\"cat\" hint-placeholder-count=\"4\"><option value=\"{{ cat }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist><\u002Fdiv>\n<div class=\"field\"><label>Monto<\u002Flabel><input class=\"mono\" type=\"number\" value=\"{{ form.monto }}\" sc-camel-on-input=\"{{ onMontoInput }}\" placeholder=\"0\"><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"row2\">\n<div class=\"field\"><label>Tipo<\u002Flabel><sc-raw-select value=\"{{ form.tipo }}\" sc-camel-on-change=\"{{ onTipoChange }}\"><sc-for list=\"{{ tiposList }}\" as=\"tp\" hint-placeholder-count=\"2\"><option value=\"{{ tp }}\">{{ tp }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n<div class=\"field\"><label>Método de pago<\u002Flabel><sc-raw-select value=\"{{ form.metodoPago }}\" sc-camel-on-change=\"{{ onMedioChange }}\"><sc-for list=\"{{ mediosList }}\" as=\"md\" hint-placeholder-count=\"2\"><option value=\"{{ md }}\">{{ md }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"row2\" style=\"align-items:end\">\n<div class=\"field\"><label>Estado<\u002Flabel><sc-raw-select value=\"{{ form.estado }}\" sc-camel-on-change=\"{{ onEstadoChange }}\"><sc-for list=\"{{ estadosList }}\" as=\"es\" hint-placeholder-count=\"2\"><option value=\"{{ es }}\">{{ es }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n<label class=\"checkrow\"><input type=\"checkbox\" checked=\"{{ form.recurrente }}\" sc-camel-on-change=\"{{ onRecurrenteChange }}\">Recurrente<\u002Flabel>\n<\u002Fdiv>\n<div class=\"field\"><label>Deuda vinculada (opcional)<\u002Flabel><sc-raw-select value=\"{{ form.deuda }}\" sc-camel-on-change=\"{{ onDeudaChange }}\"><option value=\"\">Ninguna<\u002Foption><sc-for list=\"{{ deudaOptions }}\" as=\"dn\" hint-placeholder-count=\"2\"><option value=\"{{ dn }}\">{{ dn }}<\u002Foption><\u002Fsc-for><\u002Fsc-raw-select><\u002Fdiv>\n<button class=\"submitbtn\" sc-camel-on-click=\"{{ submitGasto }}\" disabled=\"{{ submitting }}\">{{ submitLabel }}<\u002Fbutton>\n<\u002Fdiv><\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"toast {{ toastClass }}\">{{ toastMsg }}<\u002Fdiv><\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  API_URL = 'https://script.google.com/macros/s/AKfycbyxoGGvn0KRoIbelHmQVnKZTSVi-QTYRpPQX_4XQkrapz0G-zkpo6KYMQ8JzfNJeqwxPA/exec';\n  MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];\n  MESES_IDX = { enero:0, febrero:1, marzo:2, abril:3, mayo:4, junio:5, julio:6, agosto:7, septiembre:8, setiembre:8, octubre:9, noviembre:10, diciembre:11 };\n  MESES_FULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];\n  TIPOS = ['Gasto','Ingreso'];\n  MEDIOS = ['Efectivo','Tarjeta'];\n  ESTADOS = ['Pagado','Pendiente'];\n\n  state = {\n    activeTab: 'resumen', loading: true, connected: false,\n    gastos: [], presupuestos: [], deudas: [], cambio: [],\n    selectedMonth: null, modalOpen: false, submitting: false, toast: null, editingPendRow: null, editingField: null,\n    goal: Number(localStorage.getItem('finanzas_goal') || 0) || 200000,\n    expandedDebt: null,\n    planHover: null,\n    galiciaCapital: Number(localStorage.getItem('finanzas_galicia_capital')) || 11384961.89,\n    galiciaExtra: Number(localStorage.getItem('finanzas_galicia_extra')) || 350000,\n    galiciaCuotaSim: Number(localStorage.getItem('finanzas_galicia_cuota_sim')) || 1263558.80,\n    galiciaExtraSchedule: JSON.parse(localStorage.getItem('finanzas_galicia_extra_schedule') || '{}'),\n    naranjaCapital: Number(localStorage.getItem('finanzas_naranja_capital')) || 3668094,\n    naranjaCuotaSim: Number(localStorage.getItem('finanzas_naranja_cuota_sim')) || 279307,\n    deudasSubTab: 'resumen',\n    galiciaCapitalUpdatedMonth: localStorage.getItem('finanzas_galicia_capital_month') || null,\n    naranjaCapitalUpdatedMonth: localStorage.getItem('finanzas_naranja_capital_month') || null,\n    form: { concepto: '', categoria: '', monto: '', tipo: 'Gasto', metodoPago: 'Efectivo', estado: 'Pagado', recurrente: false, deuda: '' },\n  };\n\n  componentDidMount() {\n    this.state.selectedMonth = this.monthKey(new Date());\n    this.loadData();\n  }\n\n  monthKey(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }\n  monthLabel(key) { const p = key.split('-'); return this.MESES[parseInt(p[1], 10) - 1] + ' ' + p[0]; }\n  fmtMoney(n) { return '$' + Math.round(n || 0).toLocaleString('es-AR'); }\n  parseFecha(raw) {\n    const s = String(raw || '').trim().toLowerCase();\n    if (this.MESES_IDX.hasOwnProperty(s)) return new Date(new Date().getFullYear(), this.MESES_IDX[s], 1);\n    const d = new Date(raw);\n    if (!isNaN(d)) return d;\n    return new Date();\n  }\n\n  sampleData() {\n    const rows = [\n      ['julio','Préstamo MP','Préstamo',334970,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Compra estantería oficina','Compras',76999,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Supermercado supermami','Supermercado',263228,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Tenis','Deporte',58000,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Monotributo','Monotributo',42387,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Prestamo Anses','Préstamo',26324,'Gasto','Efectivo','Si','Pendiente'],\n      ['julio','Alquiler + impuestos','Alquiler',887538,'Gasto','Efectivo','Si','Pendiente'],\n      ['julio','Internet y cel','Internet',45336,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','EPEC','Servicios',35682,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Ecogas','Servicios',32709,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Gamepass','Subscripciones',25015,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Tarjetas Galicia','Tarjeta',1048096,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Tarjeta Naranja','Tarjeta',290767,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Gimnasio x3 meses','Deporte',110000,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Didi','Transporte',6111,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Delivery','Delivery',12150,'Gasto','Efectivo','No','Pagado'],\n      ['julio','Pase plata a Mamá','Mamá',200000,'Gasto','Efectivo','Si','Pagado'],\n      ['julio','Salario Craftech con bono','Salario',1800000,'Ingreso','Efectivo','Si','Pagado'],\n      ['junio','Alquiler + impuestos','Alquiler',850000,'Gasto','Efectivo','Si','Pagado'],\n      ['junio','Supermercado','Supermercado',210000,'Gasto','Efectivo','Si','Pagado'],\n      ['junio','Salario Craftech','Salario',1700000,'Ingreso','Efectivo','Si','Pagado'],\n      ['mayo','Alquiler + impuestos','Alquiler',820000,'Gasto','Efectivo','Si','Pagado'],\n      ['mayo','Supermercado','Supermercado',195000,'Gasto','Efectivo','Si','Pagado'],\n      ['mayo','Salario Craftech','Salario',1650000,'Ingreso','Efectivo','Si','Pagado'],\n    ];\n    const gastos = rows.map((r, i) => ({ rowIndex: i + 2, 'Marca temporal': r[0], Concepto: r[1], Categoría: r[2], Monto: r[3], Tipo: r[4], 'Método de pago': r[5], Recurrente: r[6], Estado: r[7] }));\n    const presupuestos = [\n      { rowIndex: 2, Categoría: 'Supermercado', 'Presupuesto Mensual': 250000, Mes: 'julio' },\n      { rowIndex: 3, Categoría: 'Alquiler', 'Presupuesto Mensual': 900000, Mes: 'julio' },\n      { rowIndex: 4, Categoría: 'Deporte', 'Presupuesto Mensual': 100000, Mes: 'julio' },\n    ];\n    const deudas = [\n      { 'Fecha de pago': '2026-05-05', Deuda: 'Tarjeta Galicia', 'Cuota número': 3, 'Cuotas restantes': 22, 'Cuota mensual': 1052079, Estado: 'Pagada', TNA: 0.6 },\n      { 'Fecha de pago': '2026-06-05', Deuda: 'Tarjeta Galicia', 'Cuota número': 4, 'Cuotas restantes': 21, 'Cuota mensual': 1048096, Estado: 'Pagada', TNA: 0.6 },\n      { 'Fecha de pago': '2026-07-05', Deuda: 'Tarjeta Galicia', 'Cuota número': 5, 'Cuotas restantes': 20, 'Cuota mensual': 1044704, Estado: 'Pendiente', TNA: 0.6 },\n      { 'Fecha de pago': '2026-05-10', Deuda: 'Tarjeta Naranja', 'Cuota número': 2, 'Cuotas restantes': 22, 'Cuota mensual': 279307, Estado: 'Pagado', TNA: 0.55 },\n      { 'Fecha de pago': '2026-06-10', Deuda: 'Tarjeta Naranja', 'Cuota número': 3, 'Cuotas restantes': 21, 'Cuota mensual': 279307, Estado: 'Pagado', TNA: 0.55 },\n      { 'Fecha de pago': '2026-07-10', Deuda: 'Tarjeta Naranja', 'Cuota número': 4, 'Cuotas restantes': 20, 'Cuota mensual': 279307, Estado: 'Pendiente', TNA: 0.55 },\n      { 'Fecha de pago': '2026-06-10', Deuda: 'Préstamo Anses', 'Cuota número': 28, 'Cuotas restantes': 20, 'Cuota mensual': 26311, Estado: 'Pagada', TNA: '' },\n      { 'Fecha de pago': '2026-07-10', Deuda: 'Préstamo Anses', 'Cuota número': 29, 'Cuotas restantes': 19, 'Cuota mensual': 26307, Estado: 'Pagada', TNA: '' },\n      { 'Fecha de pago': '2026-08-10', Deuda: 'Préstamo Anses', 'Cuota número': 30, 'Cuotas restantes': 18, 'Cuota mensual': 26307, Estado: 'Pendiente', TNA: '' },\n    ];\n    const cambio = [\n      { rowIndex: 2, Fecha: '2026-05-10', Plataforma: 'Binance', Dolares: 300, 'Pesos Recibí': 360000, Cotización: 1200 },\n      { rowIndex: 3, Fecha: '2026-06-12', Plataforma: 'Banco', Dolares: 200, 'Pesos Recibí': 250000, Cotización: 1250 },\n    ];\n    return { gastos, presupuestos, deudas, cambio };\n  }\n\n  async loadData() {\n    this.setState({ loading: true });\n    try {\n      const res = await fetch(this.API_URL + '?action=data');\n      if (!res.ok) throw new Error('HTTP ' + res.status);\n      const data = await res.json();\n      if (data.error) throw new Error(data.error);\n      const patch = { gastos: data.gastos || [], presupuestos: data.presupuestos || [], deudas: data.deudas || [], cambio: data.cambio || [], connected: true, loading: false };\n      (data.deudaConfig || []).forEach(row => {\n        const nombre = String(row['Tarjeta'] || '').trim().toLowerCase();\n        const capital = Number(row['Capital adeudado']) || 0;\n        const extra = Number(row['Extra mensual']) || 0;\n        if (nombre.indexOf('galicia') >= 0) {\n          if (capital > 0) patch.galiciaCapital = capital;\n          if (row['Extra mensual'] !== '' && row['Extra mensual'] !== undefined) patch.galiciaExtra = extra;\n          if (row['Extra Schedule JSON']) { try { const parsed = JSON.parse(row['Extra Schedule JSON']); if (parsed && typeof parsed === 'object') patch.galiciaExtraSchedule = parsed; } catch (e) {} }\n        } else if (nombre.indexOf('naranja') >= 0) {\n          if (capital > 0) patch.naranjaCapital = capital;\n        }\n      });\n      this.setState(patch);\n    } catch (e) {\n      const d = this.sampleData();\n      this.setState({ ...d, connected: false, loading: false });\n    }\n  }\n\n  showToast(msg, bad) {\n    this.setState({ toast: { msg, bad } });\n    setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n\n  setTab(tab) { this.setState({ activeTab: tab }); }\n  setMonth(key) { this.setState({ selectedMonth: key }); }\n\n  openModal() { this.setState({ modalOpen: true, form: { concepto: '', categoria: '', monto: '', tipo: 'Gasto', metodoPago: 'Efectivo', estado: 'Pagado', recurrente: false, deuda: '' } }); }\n  closeModal() { this.setState({ modalOpen: false }); }\n\n  updateForm(key, val) { this.setState(s => ({ form: { ...s.form, [key]: val } })); }\n\n  async submitGasto() {\n    const f = this.state.form;\n    if (!f.concepto.trim() || !f.categoria.trim() || !Number(f.monto)) { this.showToast('Completá concepto, categoría y monto', true); return; }\n    this.setState({ submitting: true });\n    const datos = { concepto: f.concepto.trim(), categoria: f.categoria.trim(), monto: Number(f.monto), tipo: f.tipo, metodoPago: f.metodoPago, recurrente: f.recurrente, estado: f.estado, deuda: f.deuda || '' };\n    const mesActual = this.MESES_IDX && Object.keys(this.MESES_IDX).find(k => this.MESES_IDX[k] === new Date().getMonth());\n    const nuevo = { rowIndex: -1, 'Marca temporal': mesActual, Concepto: datos.concepto, Categoría: datos.categoria, Monto: datos.monto, Tipo: datos.tipo, 'Método de pago': datos.metodoPago, Recurrente: datos.recurrente ? 'Si' : 'No', Estado: datos.estado, Deuda: datos.deuda };\n    try {\n      if (this.state.connected) {\n        const res = await fetch(this.API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'agregarGasto', datos }) });\n        const r = await res.json();\n        if (!r.success) throw new Error(r.error || 'error');\n      }\n      this.setState(s => ({ gastos: [...s.gastos, nuevo], modalOpen: false, submitting: false }));\n      this.showToast('Gasto registrado', false);\n    } catch (e) {\n      this.setState({ submitting: false });\n      this.showToast('No se pudo guardar. Se guardó localmente.', true);\n      this.setState(s => ({ gastos: [...s.gastos, nuevo], modalOpen: false }));\n    }\n  }\n\n  async updateMontoGasto(rowIndex, val) {\n    const monto = Number(val) || 0;\n    this.setState(s => ({ gastos: s.gastos.map(g => g.rowIndex === rowIndex ? { ...g, monto } : g) }));\n    if (this.state.connected) {\n      try {\n        const res = await fetch(this.API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'actualizarMonto', rowIndex, monto }) });\n        const r = await res.json();\n        if (!r.success) throw new Error(r.error || 'error');\n        this.showToast('Monto actualizado', false);\n      } catch (e) {\n        this.showToast('No se pudo guardar en el Sheet', true);\n      }\n    } else {\n      this.showToast('Monto actualizado (sin conexión)', false);
